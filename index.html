<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>拾句 · 我們的句子收藏</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<style>
:root{
  --cream: #FAF7F0;
  --cream-deep: #F1EADA;
  --ink: #4A3F35;
  --ink-soft: #8A7A68;
  --latte: #C9A576;
  --latte-soft: #E3D2B6;
  --line: #E3D9C8;
  --serif: "Noto Serif TC", serif;
  --display: "Cormorant Garamond", "Noto Serif TC", serif;
}

html{
  -webkit-text-size-adjust: 100%;
  text-size-adjust: 100%;
}

html, body{
  overflow-x: hidden;
  width: 100%;
}

*{box-sizing:border-box;}

body{
  margin:0;
  background:var(--cream);
  color:var(--ink);
  font-family:var(--serif);
  -webkit-font-smoothing:antialiased;
  letter-spacing:0.02em;
}

.hidden{display:none !important;}

/* ---------- 密碼門 ---------- */
.gate{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:
    radial-gradient(circle at 20% 20%, rgba(201,165,118,0.10), transparent 50%),
    radial-gradient(circle at 80% 80%, rgba(201,165,118,0.10), transparent 50%),
    var(--cream);
}
.gate-card{
  text-align:center;
  padding:56px 48px;
  background:#fff;
  border:1px solid var(--line);
  border-radius:2px;
  box-shadow:0 24px 60px -24px rgba(74,63,53,0.18);
  width:min(360px, 86vw);
}
.gate-mark{
  font-family:var(--display);
  font-size:42px;
  font-style:italic;
  color:var(--latte);
  margin:0 0 4px;
  letter-spacing:0.1em;
}
.gate-sub{
  font-size:13px;
  color:var(--ink-soft);
  margin:0 0 28px;
}
.gate-card input{
  width:100%;
  padding:12px 14px;
  border:1px solid var(--line);
  border-radius:2px;
  background:var(--cream);
  font-family:var(--serif);
  font-size:16px;
  color:var(--ink);
  margin-bottom:14px;
  text-align:center;
}
.gate-card input:focus{outline:none;border-color:var(--latte);}
.gate-card button{
  width:100%;
  padding:12px;
  border:none;
  background:var(--ink);
  color:var(--cream);
  letter-spacing:0.15em;
  font-family:var(--serif);
  font-size:14px;
  border-radius:2px;
  cursor:pointer;
  transition:background 0.25s ease;
}
.gate-card button:hover{background:var(--latte);}
.gate-error{
  color:#A8645B;
  font-size:12px;
  min-height:18px;
  margin-top:10px;
}

/* ---------- 整體版面 ---------- */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:16px;
  padding:36px clamp(20px,6vw,64px) 20px;
  border-bottom:1px solid var(--line);
}
.brand{display:flex;align-items:center;gap:16px;}
.brand-mark{
  font-family:var(--display);
  font-size:34px;
  font-style:italic;
  color:var(--latte);
  border:1px solid var(--latte-soft);
  width:48px;height:48px;
  display:flex;align-items:center;justify-content:center;
  border-radius:50%;
}
.brand-text h1{
  margin:0;
  font-size:22px;
  font-weight:500;
  letter-spacing:0.08em;
}
.brand-text p{
  margin:2px 0 0;
  font-size:12px;
  color:var(--ink-soft);
}

.whoami{display:flex;align-items:center;gap:10px;}
.whoami-label{font-size:12px;color:var(--ink-soft);}
.whoami-buttons{display:flex;gap:8px;}
.who-btn{
  padding:8px 18px;
  border:1px solid var(--line);
  background:#fff;
  border-radius:20px;
  font-family:var(--serif);
  font-size:13px;
  color:var(--ink-soft);
  cursor:pointer;
  transition:all 0.2s ease;
}
.who-btn.active{
  background:var(--ink);
  color:var(--cream);
  border-color:var(--ink);
}

.layout{
  max-width:760px;
  margin:0 auto;
  padding:40px clamp(20px,6vw,0px) 80px;
  display:flex;
  flex-direction:column;
  gap:28px;
}

.card{
  background:#fff;
  border:1px solid var(--line);
  border-radius:2px;
  padding:32px clamp(24px,5vw,44px);
}

.eyebrow{
  font-size:11px;
  letter-spacing:0.2em;
  text-transform:uppercase;
  color:var(--latte);
  margin:0 0 18px;
}

/* ---------- 每日一句 ---------- */
.daily-card{text-align:center;position:relative;}
.daily-text{
  font-family:var(--display);
  font-size:clamp(22px,4vw,30px);
  font-style:italic;
  line-height:1.6;
  margin:8px 0 16px;
  color:var(--ink);
  quotes:"「" "」";
}
.daily-text::before{content:"「";color:var(--latte-soft);margin-right:2px;}
.daily-text::after{content:"」";color:var(--latte-soft);margin-left:2px;}
.daily-source{
  font-size:13px;
  color:var(--ink-soft);
  margin:0;
}
.hr{
  width:48px;
  height:1px;
  background:var(--latte);
  margin:20px auto 0;
}

/* ---------- 積分 ---------- */
.score-row{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:32px;
}
.score-item{text-align:center;}
.score-name{margin:0 0 6px;font-size:13px;color:var(--ink-soft);letter-spacing:0.05em;}
.score-num{
  margin:0;
  font-family:var(--display);
  font-size:38px;
  color:var(--latte);
}
.score-divider{font-size:20px;color:var(--line);}

/* ---------- 新增 ---------- */
.add-card textarea,
.add-card input,
.list-card input{
  width:100%;
  border:1px solid var(--line);
  border-radius:2px;
  background:var(--cream);
  font-family:var(--serif);
  color:var(--ink);
  padding:12px 14px;
  font-size:16px;
  margin-bottom:12px;
  resize:vertical;
}
.add-card textarea:focus,
.add-card input:focus,
.list-card input:focus{outline:none;border-color:var(--latte);}
.add-card button{
  padding:10px 28px;
  border:none;
  background:var(--ink);
  color:var(--cream);
  border-radius:2px;
  font-family:var(--serif);
  letter-spacing:0.1em;
  cursor:pointer;
  transition:background 0.25s ease;
}
.add-card button:hover{background:var(--latte);}
.add-msg{font-size:12px;color:var(--ink-soft);margin:10px 0 0;min-height:16px;}

/* ---------- 列表 ---------- */
.sentence-list{margin-top:18px;display:flex;flex-direction:column;}
.sentence-item{
  padding:18px 0;
  border-top:1px solid var(--line);
  display:flex;
  flex-direction:column;
  gap:6px;
}
.sentence-item:first-child{border-top:none;}
.sentence-item .text{
  font-family:var(--display);
  font-size:17px;
  font-style:italic;
  line-height:1.55;
}
.sentence-item .meta{
  font-size:12px;
  color:var(--ink-soft);
  display:flex;
  gap:10px;
}
.sentence-item .tag{
  color:var(--latte);
}
.empty-hint{
  color:var(--ink-soft);
  font-size:13px;
  text-align:center;
  padding:30px 0;
}

.footer{
  text-align:center;
  font-size:12px;
  color:var(--ink-soft);
  padding:30px 0 50px;
  letter-spacing:0.1em;
}

@media (max-width:600px){
  .topbar{padding:28px 20px 16px;}
  .layout{padding:28px 20px 60px;}
  .card{padding:26px 22px;}
}
</style>
</head>
<body>

<!-- 密碼門 -->
<div id="gate" class="gate">
  <div class="gate-card">
    <p class="gate-mark">拾句</p>
    <p class="gate-sub">輕輕推開，走進我們的句子收藏</p>
    <input type="password" id="gate-input" placeholder="請輸入通行密語" autocomplete="off">
    <button id="gate-btn">進入</button>
    <p id="gate-error" class="gate-error"></p>
  </div>
</div>

<!-- 主畫面 -->
<div id="app" class="app hidden">

  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">拾</span>
      <div class="brand-text">
        <h1>拾句</h1>
        <p>把喜歡的句子，一句一句拾起來</p>
      </div>
    </div>

    <div class="whoami">
      <span class="whoami-label">我是</span>
      <div class="whoami-buttons">
        <button class="who-btn" data-who="A">__NAME_A__</button>
        <button class="who-btn" data-who="B">__NAME_B__</button>
      </div>
    </div>
  </header>

  <main class="layout">

    <!-- 每日一句 -->
    <section class="card daily-card">
      <p class="eyebrow">今日的句子 · <span id="today-date"></span></p>
      <blockquote id="daily-sentence" class="daily-text">尚無句子，從新增一句開始吧。</blockquote>
      <p id="daily-source" class="daily-source"></p>
      <div class="hr"></div>
    </section>

    <!-- 積分板 -->
    <section class="card score-card">
      <p class="eyebrow">積分</p>
      <div class="score-row">
        <div class="score-item">
          <p class="score-name" id="score-name-A">__NAME_A__</p>
          <p class="score-num" id="score-num-A">0</p>
        </div>
        <div class="score-divider">·</div>
        <div class="score-item">
          <p class="score-name" id="score-name-B">__NAME_B__</p>
          <p class="score-num" id="score-num-B">0</p>
        </div>
      </div>
    </section>

    <!-- 新增句子 -->
    <section class="card add-card">
      <p class="eyebrow">新增一句</p>
      <textarea id="new-text" placeholder="寫下那句讓你心動、安靜下來，或想留住的話……" rows="3"></textarea>
      <input type="text" id="new-source" placeholder="出處（作者／書名／電影，選填）">
      <button id="add-btn">收進句子盒</button>
      <p id="add-msg" class="add-msg"></p>
    </section>

    <!-- 搜尋 + 列表 -->
    <section class="card list-card">
      <p class="eyebrow">句子盒</p>
      <input type="text" id="search-input" placeholder="搜尋句子、出處或新增者……">
      <div id="sentence-list" class="sentence-list">
        <p class="empty-hint">載入中……</p>
      </div>
    </section>

  </main>

  <footer class="footer">為我們兩個人，安靜地收藏。</footer>
</div>

<script type="module">
// ====================================================================
// 設定區：你只需要修改這裡
// ====================================================================
const CONFIG = {
  // 通行密語：兩人都用同一個密碼進站
  PASSWORD: "1001",

  // 兩個人的名字（會顯示在「我是」按鈕、積分板上）
  NAME_A: "Stan",
  NAME_B: "Eirene",

  // Firebase 設定，從 Firebase 主控台「專案設定」貼過來（教學見 README）
  firebaseConfig: {
    apiKey: "AIzaSyB1f4c0-m_uapAqoUhnVIIG5htUs45QVTU",
    authDomain: "sentences-d12f3.firebaseapp.com",
    projectId: "sentences-d12f3",
    storageBucket: "sentences-d12f3.firebasestorage.app",
    messagingSenderId: "117935388501",
    appId: "1:117935388501:web:5aa84e92227dc9dfb2a1dc"
  }
};
// ====================================================================

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, collection, addDoc, onSnapshot,
  query, orderBy, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const fbApp = initializeApp(CONFIG.firebaseConfig);
const db = getFirestore(fbApp);
const sentencesCol = collection(db, "sentences");

let allSentences = []; // 本地快取，從 Firestore 同步
let booted = false; // 是否已經啟動過（避免重複訂閱 Firestore）

// ---------------- 把名字套進畫面 ----------------
document.querySelectorAll('[data-who="A"]').forEach(el => el.textContent = CONFIG.NAME_A);
document.querySelectorAll('[data-who="B"]').forEach(el => el.textContent = CONFIG.NAME_B);
document.getElementById("score-name-A").textContent = CONFIG.NAME_A;
document.getElementById("score-name-B").textContent = CONFIG.NAME_B;

// ---------------- 密碼門 ----------------
const gate = document.getElementById("gate");
const app = document.getElementById("app");

function tryEnter(pw) {
  if (pw === CONFIG.PASSWORD) {
    localStorage.setItem("sentence_site_authed", "1");
    gate.classList.add("hidden");
    app.classList.remove("hidden");
    boot();
  } else {
    document.getElementById("gate-error").textContent = "密語不對喔，再試一次。";
  }
}

document.getElementById("gate-btn").addEventListener("click", () => {
  tryEnter(document.getElementById("gate-input").value);
});
document.getElementById("gate-input").addEventListener("keydown", e => {
  if (e.key === "Enter") tryEnter(e.target.value);
});

if (localStorage.getItem("sentence_site_authed") === "1") {
  gate.classList.add("hidden");
  app.classList.remove("hidden");
  boot();
}

// ---------------- 「我是誰」切換（記住裝置） ----------------
function setWhoUI(who) {
  document.querySelectorAll(".who-btn").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.who === who);
  });
}

function initWhoami() {
  let who = localStorage.getItem("sentence_site_who");
  if (!who) {
    who = "A";
    localStorage.setItem("sentence_site_who", who);
  }
  setWhoUI(who);

  document.querySelectorAll(".who-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      localStorage.setItem("sentence_site_who", btn.dataset.who);
      setWhoUI(btn.dataset.who);
    });
  });
}

function currentWho() {
  return localStorage.getItem("sentence_site_who") || "A";
}

function nameOf(who) {
  return who === "A" ? CONFIG.NAME_A : CONFIG.NAME_B;
}

// ---------------- 啟動：訂閱 Firestore ----------------
function boot() {
  if (booted) return;
  booted = true;
  initWhoami();

  const q = query(sentencesCol, orderBy("createdAt", "desc"));
  onSnapshot(q, snapshot => {
    allSentences = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
    renderScores();
    renderDaily();
    renderList(document.getElementById("search-input").value);
  });

  document.getElementById("search-input").addEventListener("input", e => {
    renderList(e.target.value);
  });

  document.getElementById("add-btn").addEventListener("click", addSentence);
}

// ---------------- 新增句子 ----------------
async function addSentence() {
  const textEl = document.getElementById("new-text");
  const sourceEl = document.getElementById("new-source");
  const msg = document.getElementById("add-msg");
  const text = textEl.value.trim();
  const source = sourceEl.value.trim();

  if (!text) {
    msg.textContent = "先寫下一句話吧。";
    return;
  }

  msg.textContent = "收進去了……";
  try {
    await addDoc(sentencesCol, {
      text,
      source: source || "",
      addedBy: currentWho(),
      addedByName: nameOf(currentWho()),
      createdAt: serverTimestamp()
    });
    textEl.value = "";
    sourceEl.value = "";
    msg.textContent = "已經收進句子盒了 ✓";
    setTimeout(() => (msg.textContent = ""), 2500);
  } catch (err) {
    console.error(err);
    msg.textContent = "出了點問題，請稍後再試。";
  }
}

// ---------------- 積分 ----------------
function renderScores() {
  const scoreA = allSentences.filter(s => s.addedBy === "A").length;
  const scoreB = allSentences.filter(s => s.addedBy === "B").length;
  document.getElementById("score-num-A").textContent = scoreA;
  document.getElementById("score-num-B").textContent = scoreB;
}

// ---------------- 每日一句（同一天兩人看到一樣的句子） ----------------
function renderDaily() {
  const dateStr = new Date().toLocaleDateString("zh-Hant-TW", {
    year: "numeric", month: "long", day: "numeric"
  });
  document.getElementById("today-date").textContent = dateStr;

  if (allSentences.length === 0) return;

  const todayKey = new Date().toISOString().slice(0, 10); // YYYY-MM-DD
  const seed = hashString(todayKey);
  const index = seed % allSentences.length;
  const pick = allSentences[index];

  document.getElementById("daily-sentence").textContent = pick.text;
  document.getElementById("daily-source").textContent =
    [pick.source, pick.addedByName].filter(Boolean).join(" · ");
}

function hashString(str) {
  let hash = 0;
  for (let i = 0; i < str.length; i++) {
    hash = (hash << 5) - hash + str.charCodeAt(i);
    hash |= 0;
  }
  return Math.abs(hash);
}

// ---------------- 搜尋列表 ----------------
function renderList(keyword) {
  const list = document.getElementById("sentence-list");
  const kw = (keyword || "").trim().toLowerCase();

  const filtered = allSentences.filter(s => {
    if (!kw) return true;
    return (
      (s.text || "").toLowerCase().includes(kw) ||
      (s.source || "").toLowerCase().includes(kw) ||
      (s.addedByName || "").toLowerCase().includes(kw)
    );
  });

  if (filtered.length === 0) {
    list.innerHTML = `<p class="empty-hint">${allSentences.length === 0 ? "句子盒還是空的，新增第一句吧。" : "沒有找到符合的句子。"}</p>`;
    return;
  }

  list.innerHTML = filtered.map(s => `
    <div class="sentence-item">
      <p class="text">「${escapeHtml(s.text)}」</p>
      <p class="meta">
        ${s.source ? `<span>${escapeHtml(s.source)}</span>` : ""}
        <span class="tag">${escapeHtml(s.addedByName || "")}</span>
      </p>
    </div>
  `).join("");
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}
</script>
</body>
</html>
