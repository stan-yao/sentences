<style>
:root{
  --cream: #F3ECE1;
  --cream-deep: #E7DAC3;
  --ink: #463C32;
  --ink-soft: #8C7E6C;
  --latte: #B89968;
  --latte-soft: #D9C7A0;
  --line: #DDD0B8;
  --stone: #C9B89A;
  --serif: "Noto Serif TC", serif;
  --display: "Cormorant Garamond", "Noto Serif TC", serif;
}

html{
  -webkit-text-size-adjust: 100%;
  text-size-adjust: 100%;
}

html, body{
  overflow-x: hidden;
  width: 100%;
}

*{box-sizing:border-box;}

body{
  margin:0;
  color:var(--ink);
  font-family:var(--serif);
  -webkit-font-smoothing:antialiased;
  letter-spacing:0.02em;
  background-color:var(--cream);
  background-image:
    radial-gradient(ellipse 80% 50% at 15% 0%, rgba(255,255,255,0.55), transparent 60%),
    radial-gradient(ellipse 60% 45% at 100% 15%, rgba(201,184,154,0.35), transparent 65%),
    linear-gradient(115deg, transparent 0%, transparent 38%, rgba(255,255,255,0.30) 42%, transparent 47%, transparent 58%, rgba(70,60,50,0.045) 62%, transparent 68%),
    radial-gradient(ellipse 70% 60% at 85% 100%, rgba(184,153,104,0.16), transparent 60%);
  background-attachment:fixed;
  background-size:cover;
  min-height:100vh;
}

.hidden{display:none !important;}

/* ---------- 密碼門 ---------- */
.gate{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:
    radial-gradient(ellipse 70% 50% at 20% 10%, rgba(255,255,255,0.5), transparent 60%),
    radial-gradient(ellipse 60% 55% at 90% 90%, rgba(184,153,104,0.20), transparent 65%),
    var(--cream);
}
.gate-card{
  text-align:center;
  padding:56px 48px;
  background:rgba(255,255,255,0.7);
  border:1px solid var(--line);
  border-radius:2px;
  box-shadow:0 24px 60px -24px rgba(70,60,50,0.20);
  width:min(360px, 86vw);
}
.gate-mark{
  width:56px;
  height:56px;
  margin:0 auto 14px;
  border-radius:14px;
  display:block;
}
.gate-sub{
  font-size:13px;
  color:var(--ink-soft);
  margin:0 0 28px;
}
.gate-card input{
  width:100%;
  padding:12px 14px;
  border:1px solid var(--line);
  border-radius:2px;
  background:var(--cream);
  font-family:var(--serif);
  font-size:16px;
  color:var(--ink);
  margin-bottom:14px;
  text-align:center;
}
.gate-card input:focus{outline:none;border-color:var(--latte);}
.gate-card button{
  width:100%;
  padding:12px;
  border:none;
  background:var(--ink);
  color:var(--cream);
  letter-spacing:0.15em;
  font-family:var(--serif);
  font-size:14px;
  border-radius:2px;
  cursor:pointer;
  transition:background 0.25s ease;
}
.gate-card button:hover{background:var(--latte);}
.gate-error{
  color:#A8645B;
  font-size:12px;
  min-height:18px;
  margin-top:10px;
}

/* ---------- 整體版面 ---------- */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:16px;
  padding:36px clamp(20px,6vw,64px) 20px;
  border-bottom:1px solid var(--line);
}
.brand{display:flex;align-items:center;gap:14px;}
.brand-mark{
  width:40px;
  height:40px;
  border-radius:11px;
  display:block;
  flex-shrink:0;
}
.brand-row{
  display:flex;
  align-items:center;
  gap:3px;
}
.brand-text h1{
  margin:0;
  font-size:21px;
  font-weight:500;
  letter-spacing:0.08em;
  line-height:1;
}
.brand-wordmark{
  height:24px;
  display:block;
  opacity:0.9;
}
.brand-text p{
  margin:6px 0 0;
  font-size:12px;
  color:var(--ink-soft);
}

.whoami{display:flex;align-items:center;gap:10px;}
.whoami-label{font-size:12px;color:var(--ink-soft);}
.whoami-buttons{display:flex;gap:8px;}
.who-btn{
  padding:8px 18px;
  border:1px solid var(--line);
  background:#fff;
  border-radius:20px;
  font-family:var(--serif);
  font-size:13px;
  color:var(--ink-soft);
  cursor:pointer;
  transition:all 0.2s ease;
}
.who-btn.active{
  background:var(--ink);
  color:var(--cream);
  border-color:var(--ink);
}

.layout{
  max-width:760px;
  margin:0 auto;
  padding:40px clamp(20px,6vw,0px) 80px;
  display:flex;
  flex-direction:column;
  gap:28px;
}

.card{
  background:rgba(255,255,255,0.62);
  border:1px solid var(--line);
  border-radius:2px;
  padding:32px clamp(24px,5vw,44px);
  backdrop-filter:blur(2px);
}

.eyebrow{
  font-size:11px;
  letter-spacing:0.2em;
  text-transform:uppercase;
  color:var(--latte);
  margin:0 0 18px;
}

/* ---------- 每日一句 ---------- */
.daily-card{text-align:center;position:relative;}
.daily-text{
  font-family:var(--display);
  font-size:clamp(22px,4vw,30px);
  font-style:italic;
  line-height:1.6;
  margin:8px 0 16px;
  color:var(--ink);
  quotes:"「" "」";
}
.daily-text::before{content:"「";color:var(--latte-soft);margin-right:2px;}
.daily-text::after{content:"」";color:var(--latte-soft);margin-left:2px;}
.daily-source{
  font-size:13px;
  color:var(--ink-soft);
  margin:0;
}
.hr{
  width:48px;
  height:1px;
  background:var(--latte);
  margin:20px auto 0;
}

/* ---------- 積分 ---------- */
.score-row{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:32px;
}
.score-item{text-align:center;}
.score-name{margin:0 0 6px;font-size:13px;color:var(--ink-soft);letter-spacing:0.05em;}
.score-num{
  margin:0;
  font-family:var(--display);
  font-size:38px;
  color:var(--latte);
}
.score-divider{font-size:20px;color:var(--line);}

/* ---------- 新增 ---------- */
.add-card textarea,
.add-card input,
.list-card input{
  width:100%;
  border:1px solid var(--line);
  border-radius:2px;
  background:var(--cream);
  font-family:var(--serif);
  color:var(--ink);
  padding:12px 14px;
  font-size:16px;
  margin-bottom:12px;
  resize:vertical;
}
.add-card textarea:focus,
.add-card input:focus,
.list-card input:focus{outline:none;border-color:var(--latte);}
.add-card button{
  padding:10px 28px;
  border:none;
  background:var(--ink);
  color:var(--cream);
  border-radius:2px;
  font-family:var(--serif);
  letter-spacing:0.1em;
  cursor:pointer;
  transition:background 0.25s ease;
}
.add-card button:hover{background:var(--latte);}
.add-msg{font-size:12px;color:var(--ink-soft);margin:10px 0 0;min-height:16px;}

/* ---------- 列表 ---------- */
.list-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  margin-bottom:16px;
}
.view-toggle{
  display:flex;
  border:1px solid var(--line);
  border-radius:999px;
  overflow:hidden;
  flex-shrink:0;
}
.view-btn{
  font-family:var(--serif);
  font-size:11px;
  letter-spacing:0.05em;
  padding:4px 11px;
  background:transparent;
  border:none;
  color:var(--ink-soft);
  cursor:pointer;
  transition:background 0.2s ease, color 0.2s ease;
}
.view-btn.active{
  background:var(--latte);
  color:#fff;
}
.sentence-list{margin-top:18px;display:flex;flex-direction:column;}
.sentence-item{
  padding:18px 0;
  border-top:1px solid var(--line);
  display:flex;
  flex-direction:column;
  gap:6px;
}
.sentence-item:first-child{border-top:none;}
.sentence-item .text{
  font-family:var(--display);
  font-size:17px;
  font-style:italic;
  line-height:1.55;
}
.sentence-item .meta{
  font-size:12px;
  color:var(--ink-soft);
  display:flex;
  gap:10px;
}
.sentence-item .tag{
  color:var(--latte);
}

/* 緊湊模式：行距小、字級小、無斜體，方便快速瀏覽 */
.sentence-list.compact .sentence-item{
  flex-direction:row;
  align-items:baseline;
  padding:6px 0;
  gap:10px;
  border-top:none;
  border-bottom:1px dotted var(--line);
}
.sentence-list.compact .sentence-item:last-child{border-bottom:none;}
.sentence-list.compact .sentence-item .text{
  font-family:var(--serif);
  font-size:13px;
  font-style:normal;
  line-height:1.3;
  flex:1;
  min-width:0;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.sentence-list.compact .sentence-item .meta{
  font-size:10px;
  flex-shrink:0;
  white-space:nowrap;
  gap:6px;
}

.empty-hint{
  color:var(--ink-soft);
  font-size:13px;
  text-align:center;
  padding:30px 0;
}

.footer{
  text-align:center;
  font-size:12px;
  color:var(--ink-soft);
  padding:30px 0 50px;
  letter-spacing:0.1em;
}

@media (max-width:600px){
  .topbar{padding:28px 20px 16px;}
  .layout{padding:28px 20px 60px;}
  .card{padding:26px 22px;}
}
</style>
</head>

      <input type="text" id="search-input" placeholder="搜尋句子、出處或新增者……">
      <div id="sentence-list" class="sentence-list">
        <p class="empty-hint">載入中……</p>
      </div>
    </section>

  </main>

  <footer class="footer">為我們兩個人，安靜地收藏。</footer>
</div>

<script type="module">
// ====================================================================
// 設定區：你只需要修改這裡
// ====================================================================
const CONFIG = {
  // 通行密語：兩人都用同一個密碼進站
  PASSWORD: "1001",

  // 兩個人的名字（會顯示在「我是」按鈕、積分板上）
  NAME_A: "Stan",
  NAME_B: "Eirene",

  // Firebase 設定，從 Firebase 主控台「專案設定」貼過來（教學見 README）
  firebaseConfig: {
    apiKey: "AIzaSyB1f4c0-m_uapAqoUhnVIIG5htUs45QVTU",
    authDomain: "sentences-d12f3.firebaseapp.com",
    projectId: "sentences-d12f3",
    storageBucket: "sentences-d12f3.firebasestorage.app",
    messagingSenderId: "117935388501",
    appId: "1:117935388501:web:5aa84e92227dc9dfb2a1dc"
  }
};
// ====================================================================

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, collection, addDoc, onSnapshot,
  query, orderBy, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const fbApp = initializeApp(CONFIG.firebaseConfig);
const db = getFirestore(fbApp);
const sentencesCol = collection(db, "sentences");

let allSentences = []; // 本地快取，從 Firestore 同步
let booted = false; // 是否已經啟動過（避免重複訂閱 Firestore）

// ---------------- 把名字套進畫面 ----------------
document.querySelectorAll('[data-who="A"]').forEach(el => el.textContent = CONFIG.NAME_A);
document.querySelectorAll('[data-who="B"]').forEach(el => el.textContent = CONFIG.NAME_B);
document.getElementById("score-name-A").textContent = CONFIG.NAME_A;
document.getElementById("score-name-B").textContent = CONFIG.NAME_B;

// ---------------- 密碼門 ----------------
const gate = document.getElementById("gate");
const app = document.getElementById("app");

function tryEnter(pw) {
  if (pw === CONFIG.PASSWORD) {
    localStorage.setItem("sentence_site_authed", "1");
    gate.classList.add("hidden");
    app.classList.remove("hidden");
    boot();
  } else {
    document.getElementById("gate-error").textContent = "密語不對喔，再試一次。";
  }
}

document.getElementById("gate-btn").addEventListener("click", () => {
  tryEnter(document.getElementById("gate-input").value);
});
document.getElementById("gate-input").addEventListener("keydown", e => {
  if (e.key === "Enter") tryEnter(e.target.value);
});

if (localStorage.getItem("sentence_site_authed") === "1") {
  gate.classList.add("hidden");
  app.classList.remove("hidden");
  boot();
}

// ---------------- 「我是誰」切換（記住裝置） ----------------
function setWhoUI(who) {
  document.querySelectorAll(".who-btn").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.who === who);
  });
}

function initWhoami() {
  let who = localStorage.getItem("sentence_site_who");
  if (!who) {
    who = "A";
    localStorage.setItem("sentence_site_who", who);
  }
  setWhoUI(who);

  document.querySelectorAll(".who-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      localStorage.setItem("sentence_site_who", btn.dataset.who);
      setWhoUI(btn.dataset.who);
    });
  });
}

function currentWho() {
  return localStorage.getItem("sentence_site_who") || "A";
}

function nameOf(who) {
  return who === "A" ? CONFIG.NAME_A : CONFIG.NAME_B;
}

// ---------------- 顯示模式切換（文青／緊湊） ----------------
function currentViewMode() {
  return localStorage.getItem("sentence_site_view") || "cozy";
}

function setViewMode(mode) {
  localStorage.setItem("sentence_site_view", mode);
  const list = document.getElementById("sentence-list");
  list.classList.toggle("compact", mode === "compact");
  document.querySelectorAll(".view-btn").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.mode === mode);
  });
}

function initViewToggle() {
  setViewMode(currentViewMode());
  document.querySelectorAll(".view-btn").forEach(btn => {
    btn.addEventListener("click", () => setViewMode(btn.dataset.mode));
  });
}

// ---------------- 啟動：訂閱 Firestore ----------------
function boot() {
  if (booted) return;
  booted = true;
  initWhoami();
  initViewToggle();

  const q = query(sentencesCol, orderBy("createdAt", "desc"));
  onSnapshot(q, snapshot => {
    allSentences = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
    renderScores();
    renderDaily();
    renderList(document.getElementById("search-input").value);
  });

  document.getElementById("search-input").addEventListener("input", e => {
    renderList(e.target.value);
  });

  document.getElementById("add-btn").addEventListener("click", addSentence);
}

// ---------------- 新增句子 ----------------
async function addSentence() {
  const textEl = document.getElementById("new-text");
  const sourceEl = document.getElementById("new-source");
  const msg = document.getElementById("add-msg");
  const text = textEl.value.trim();
  const source = sourceEl.value.trim();

  if (!text) {
    msg.textContent = "先寫下一句話吧。";
    return;
  }

  msg.textContent = "收進去了……";
  try {
    await addDoc(sentencesCol, {
      text,
      source: source || "",
      addedBy: currentWho(),
      addedByName: nameOf(currentWho()),
      createdAt: serverTimestamp()
    });
    textEl.value = "";
    sourceEl.value = "";
    msg.textContent = "已經收進句子盒了 ✓";
    setTimeout(() => (msg.textContent = ""), 2500);
  } catch (err) {
    console.error(err);
    msg.textContent = "出了點問題，請稍後再試。";
  }
}

// ---------------- 積分 ----------------
function renderScores() {
  const scoreA = allSentences.filter(s => s.addedBy === "A").length;
  const scoreB = allSentences.filter(s => s.addedBy === "B").length;
  document.getElementById("score-num-A").textContent = scoreA;
  document.getElementById("score-num-B").textContent = scoreB;
}

// ---------------- 每日一句（同一天兩人看到一樣的句子） ----------------
function renderDaily() {
  const dateStr = new Date().toLocaleDateString("zh-Hant-TW", {
    year: "numeric", month: "long", day: "numeric"
  });
  document.getElementById("today-date").textContent = dateStr;

  if (allSentences.length === 0) return;

  const todayKey = new Date().toISOString().slice(0, 10); // YYYY-MM-DD
  const seed = hashString(todayKey);
  const index = seed % allSentences.length;
  const pick = allSentences[index];

  document.getElementById("daily-sentence").textContent = pick.text;
  document.getElementById("daily-source").textContent =
    [pick.source, pick.addedByName].filter(Boolean).join(" · ");
}

function hashString(str) {
  let hash = 0;
  for (let i = 0; i < str.length; i++) {
    hash = (hash << 5) - hash + str.charCodeAt(i);
    hash |= 0;
  }
  return Math.abs(hash);
}

// ---------------- 搜尋列表 ----------------
function renderList(keyword) {
  const list = document.getElementById("sentence-list");
  const kw = (keyword || "").trim().toLowerCase();

  const filtered = allSentences.filter(s => {
    if (!kw) return true;
    return (
      (s.text || "").toLowerCase().includes(kw) ||
      (s.source || "").toLowerCase().includes(kw) ||
      (s.addedByName || "").toLowerCase().includes(kw)
    );
  });

  if (filtered.length === 0) {
    list.innerHTML = `<p class="empty-hint">${allSentences.length === 0 ? "句子盒還是空的，新增第一句吧。" : "沒有找到符合的句子。"}</p>`;
    return;
  }

  list.innerHTML = filtered.map(s => `
    <div class="sentence-item">
      <p class="text" title="${escapeHtml(s.text)}">「${escapeHtml(s.text)}」</p>
      <p class="meta">
        ${s.source ? `<span>${escapeHtml(s.source)}</span>` : ""}
        <span class="tag">${escapeHtml(s.addedByName || "")}</span>
      </p>
    </div>
  `).join("");
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}
</script>
</body>
</html>
