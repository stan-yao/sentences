.gate-card{
  text-align:center;
  padding:56px 48px;
  background:rgba(255,255,255,0.45);
  border:1px solid rgba(255,255,255,0.5);
  border-radius:26px;
  box-shadow:0 24px 60px -24px rgba(70,60,50,0.28);
  backdrop-filter:blur(16px) saturate(140%);
  -webkit-backdrop-filter:blur(16px) saturate(140%);
  width:min(360px, 86vw);
}
html.theme-dark .gate-card{
  background:rgba(255,255,255,0.07);
  border-color:rgba(255,255,255,0.10);
}
.gate-mark{
  width:56px;
  height:56px;
  margin:0 auto 14px;
  border-radius:14px;
  display:block;
}
.gate-sub{
  font-size:13px;
  color:var(--ink-soft);
  margin:0 0 28px;
}
.gate-card input{
  width:100%;
  padding:12px 16px;
  border:1px solid var(--line);
  border-radius:12px;
  background:rgba(255,255,255,0.4);
  font-family:var(--serif);
  font-size:16px;
  color:var(--ink);
  margin-bottom:14px;
  text-align:center;
}
.gate-card input:focus{outline:none;border-color:var(--latte);}
.gate-card button{
  width:100%;
  padding:12px;
  border:none;
  background:var(--ink);
  color:var(--cream);
  letter-spacing:0.15em;
  font-family:var(--serif);
  font-size:14px;
  border-radius:999px;
  cursor:pointer;
  transition:background 0.25s ease;
}
.gate-card button:hover{background:var(--latte);}
.gate-error{
  color:#A8645B;
  font-size:12px;
  min-height:18px;
  margin-top:10px;
}

/* ---------- 整體版面 ---------- */
.topbar{
  position:relative;
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:16px;
  padding:36px clamp(20px,6vw,64px) 20px;
  border-bottom:1px solid var(--line);
}
.brand{display:flex;align-items:center;gap:14px;cursor:pointer;}
.topbar-right{display:flex;align-items:center;gap:14px;}

.theme-btn{
  width:34px;
  height:34px;
  border:1px solid var(--line);
  border-radius:50%;
  background:#fff;
  color:var(--ink-soft);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  flex-shrink:0;
  transition:background 0.2s ease, color 0.2s ease;
}
.theme-btn:hover{background:var(--latte);color:#fff;border-color:var(--latte);}
.theme-btn.hidden-by-drawer{opacity:0;pointer-events:none;transition:opacity 0.2s ease;}

/* 漢堡選單按鈕 */
.menu-btn{
  position:fixed;
  top:18px;
  right:18px;
  z-index:60;
  width:36px;
  height:36px;
  border:none;
  background:transparent;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:5px;
  cursor:pointer;
  flex-shrink:0;
  transition:opacity 0.2s ease;
}
.menu-btn.open{
  opacity:0;
  pointer-events:none;
}
.menu-btn span{
  display:block;
  width:20px;
  height:1.5px;
  background:var(--ink);
  border-radius:1px;
  transition:transform 0.25s ease, opacity 0.25s ease;
}
.menu-btn.open span:nth-child(1){transform:translateY(6.5px) rotate(45deg);}
.menu-btn.open span:nth-child(2){opacity:0;}
.menu-btn.open span:nth-child(3){transform:translateY(-6.5px) rotate(-45deg);}

/* 遮罩 */
.nav-overlay{
  position:fixed;
  inset:0;
  background:rgba(50,42,34,0.32);
  opacity:0;
  pointer-events:none;
  transition:opacity 0.25s ease;
  z-index:40;
}
.nav-overlay.open{opacity:1;pointer-events:auto;}

/* 側邊選單 */
.nav-drawer{
  position:fixed;
  top:0;
  right:0;
  height:100vh;
  width:min(300px, 80vw);
  background:rgba(255,255,255,0.55);
  border-left:1px solid rgba(255,255,255,0.5);
  border-radius:22px 0 0 22px;
  box-shadow:-18px 0 40px -20px rgba(70,60,50,0.35);
  backdrop-filter:blur(18px) saturate(140%);
  -webkit-backdrop-filter:blur(18px) saturate(140%);
  transform:translateX(100%);
  transition:transform 0.3s ease;
  z-index:50;
  display:flex;
  flex-direction:column;
  padding:24px 26px;
}
html.theme-dark .nav-drawer{
  background:rgba(30,28,25,0.6);
  border-color:rgba(255,255,255,0.10);
}
.nav-drawer.open{transform:translateX(0);}
.nav-drawer-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:24px;
}
.nav-drawer-title{
  font-size:13px;
  letter-spacing:0.15em;
  color:var(--ink-soft);
  text-transform:uppercase;
}
.nav-close{
  border:none;
  background:transparent;
  font-size:16px;
  color:var(--ink-soft);
  cursor:pointer;
  padding:4px;
}
.nav-list{
  list-style:none;
  margin:0;
  padding:0;
  display:flex;
  flex-direction:column;
}
.nav-item{
  width:100%;
  text-align:left;
  border:none;
  background:transparent;
  font-family:var(--serif);
  font-size:17px;
  color:var(--ink);
  padding:14px 4px;
  border-bottom:1px solid var(--line);
  cursor:pointer;
  letter-spacing:0.04em;
}
.nav-item.active{color:var(--latte);font-weight:500;}
.nav-drawer-foot{
  margin-top:auto;
  font-size:11px;
  color:var(--ink-soft);
  text-align:center;
  opacity:0.7;
}
.brand-mark{
  width:40px;
  height:40px;
  border-radius:11px;
  display:block;
  flex-shrink:0;
}
.brand-row{
  display:flex;
  align-items:center;
  gap:3px;
}
.brand-text h1{
  margin:0;
  font-size:21px;
  font-weight:500;
  letter-spacing:0.08em;
  line-height:1;
}
.brand-wordmark{
  height:24px;
  display:block;
  opacity:0.9;
}
.brand-text p{
  margin:6px 0 0;
  font-size:12px;
  color:var(--ink-soft);
}

.whoami{display:flex;align-items:center;gap:10px;}
.whoami-label{font-size:12px;color:var(--ink-soft);}
.whoami-buttons{display:flex;gap:8px;}
.who-btn{
  height:34px;
  padding:0 18px;
  display:inline-flex;
  align-items:center;
  border:1px solid var(--line);
  background:#fff;
  border-radius:20px;
  font-family:var(--serif);
  font-size:13px;
  color:var(--ink-soft);
  cursor:pointer;
  transition:all 0.2s ease;
}
.who-btn.active{
  background:var(--ink);
  color:var(--cream);
  border-color:var(--ink);
}

.layout{
  max-width:760px;
  margin:0 auto;
  padding:40px clamp(20px,6vw,0px) 80px;
  display:flex;
  flex-direction:column;
  gap:28px;
}
#page-home, #page-board, #page-wheel{
  display:flex;
  flex-direction:column;
  gap:28px;
}

.card{
  background:rgba(255,255,255,0.5);
  border:1px solid rgba(255,255,255,0.5);
  border-radius:20px;
  padding:32px clamp(24px,5vw,44px);
  backdrop-filter:blur(14px) saturate(140%);
  -webkit-backdrop-filter:blur(14px) saturate(140%);
  box-shadow:0 8px 30px -12px rgba(70,60,50,0.15);
}
html.theme-dark .card{
  background:rgba(255,255,255,0.06);
  border-color:rgba(255,255,255,0.10);
}

.eyebrow{
  font-size:11px;
  letter-spacing:0.2em;
  text-transform:uppercase;
  color:var(--latte);
  margin:0 0 18px;
}

/* ---------- 每日一句 ---------- */
.daily-card{text-align:center;position:relative;}
.daily-text{
  font-family:var(--display);
  font-size:clamp(22px,4vw,30px);
  font-style:italic;
  line-height:1.6;
  margin:8px 0 16px;
  color:var(--ink);
  quotes:"「" "」";
}
.daily-text::before{content:"「";color:var(--latte-soft);margin-right:2px;}
.daily-text::after{content:"」";color:var(--latte-soft);margin-left:2px;}
.daily-source{
  font-size:13px;
  color:var(--ink-soft);
  margin:0;
}
.hr{
  width:48px;
  height:1px;
  background:var(--latte);
  margin:20px auto 0;
}

/* ---------- 積分 ---------- */
.score-row{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:32px;
}
.score-item{text-align:center;}
.score-name{margin:0 0 6px;font-size:13px;color:var(--ink-soft);letter-spacing:0.05em;}
.score-num{
  margin:0;
  font-family:var(--display);
  font-size:38px;
  color:var(--latte);
}
.score-divider{font-size:20px;color:var(--line);}

/* ---------- 新增 ---------- */
.add-card textarea,
.add-card input,
.list-card input,
.board-compose-card textarea,
.wheel-cat-add-card input,
.wheel-add-card input{
  width:100%;
  border:1px solid var(--line);
  border-radius:12px;
  background:rgba(255,255,255,0.4);
  font-family:var(--serif);
  color:var(--ink);
  padding:12px 16px;
  font-size:16px;
  margin-bottom:12px;
  resize:vertical;
}
.add-card textarea:focus,
.add-card input:focus,
.list-card input:focus,
.board-compose-card textarea:focus,
.wheel-cat-add-card input:focus,
.wheel-add-card input:focus{outline:none;border-color:var(--latte);}
.add-card button,
.board-compose-card button#board-send-btn,
.wheel-cat-add-card button,
.wheel-add-card button{
  padding:10px 28px;
  border:none;
  background:var(--ink);
  color:var(--cream);
  border-radius:999px;
  font-family:var(--serif);
  letter-spacing:0.1em;
  cursor:pointer;
  transition:background 0.25s ease;
}
.add-card button:hover,
.board-compose-card button#board-send-btn:hover,
.wheel-cat-add-card button:hover,
.wheel-add-card button:hover{background:var(--latte);}
.add-msg{font-size:12px;color:var(--ink-soft);margin:10px 0 0;min-height:16px;}

/* ---------- 列表 ---------- */
.list-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  margin-bottom:16px;
}
.view-toggle{
  display:flex;
  border:1px solid var(--line);
  border-radius:999px;
  overflow:hidden;
  flex-shrink:0;
}
.view-btn{
  font-family:var(--serif);
  font-size:11px;
  letter-spacing:0.05em;
  padding:4px 11px;
  background:transparent;
  border:none;
  color:var(--ink-soft);
  cursor:pointer;
  transition:background 0.2s ease, color 0.2s ease;
}
.view-btn.active{
  background:var(--latte);
  color:#fff;
}
.sentence-list{margin-top:18px;display:flex;flex-direction:column;}
.sentence-item{
  padding:18px 0;
  border-top:1px solid var(--line);
  display:flex;
  flex-direction:column;
  gap:6px;
}
.sentence-item:first-child{border-top:none;}
.sentence-item .text{
  font-family:var(--display);
  font-size:17px;
  font-style:italic;
  line-height:1.55;
}
.sentence-item .meta{
  font-size:12px;
  color:var(--ink-soft);
  display:flex;
  gap:10px;
}
.sentence-item .tag{
  color:var(--latte);
}

/* 緊湊模式：行距小、字級小、無斜體，方便快速瀏覽 */
.sentence-list.compact .sentence-item{
  flex-direction:row;
  align-items:baseline;
  padding:6px 0;
  gap:10px;
  border-top:none;
  border-bottom:1px dotted var(--line);
}
.sentence-list.compact .sentence-item:last-child{border-bottom:none;}
.sentence-list.compact .sentence-item .text{
  font-family:var(--serif);
  font-size:13px;
  font-style:normal;
  line-height:1.3;
  flex:1;
  min-width:0;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.sentence-list.compact .sentence-item .meta{
  font-size:10px;
  flex-shrink:0;
  white-space:nowrap;
  gap:6px;
}

.empty-hint{
  color:var(--ink-soft);
  font-size:13px;
  text-align:center;
  padding:30px 0;
}

.footer{
  text-align:center;
  font-size:12px;
  color:var(--ink-soft);
  padding:30px 0 50px;
  letter-spacing:0.1em;
}

/* ---------- 選單未讀徽章 ---------- */
.nav-badge{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:18px;
  height:18px;
  padding:0 5px;
  border-radius:999px;
  background:#C0604A;
  color:#fff;
  font-size:11px;
  line-height:1;
  margin-left:6px;
  vertical-align:middle;
}
.menu-dot{
  position:absolute;
  top:2px;
  right:0px;
  width:8px;
  height:8px;
  border-radius:50%;
  background:#C0604A;
  border:1.5px solid var(--cream);
}

/* ---------- 首頁未讀提醒橫幅 ---------- */
.board-banner{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
  background:rgba(192,96,74,0.10);
  border:1px solid rgba(192,96,74,0.30);
  border-radius:16px;
  padding:14px 18px;
  margin-bottom:22px;
  font-size:13px;
  color:var(--ink);
}
.board-banner button{
  flex-shrink:0;
  border:none;
  background:transparent;
  color:#C0604A;
  font-family:var(--serif);
  font-size:13px;
  cursor:pointer;
  text-decoration:underline;
  text-underline-offset:3px;
}

/* ---------- 留言板：發表 ---------- */
.board-type-row{
  display:flex;
  gap:0;
  margin:4px 0 16px;
  border:1px solid var(--line);
  border-radius:999px;
  width:fit-content;
  overflow:hidden;
}
.board-type-btn{
  font-family:var(--serif);
  font-size:12px;
  letter-spacing:0.04em;
  padding:7px 16px;
  background:transparent;
  border:none;
  color:var(--ink-soft);
  cursor:pointer;
  transition:background 0.2s ease, color 0.2s ease;
}
.board-type-btn.active{
  background:var(--latte);
  color:#fff;
}

/* ---------- 留言板：列表 ---------- */
.board-list{margin-top:18px;display:flex;flex-direction:column;}
.board-item{
  display:flex;
  gap:14px;
  padding:20px 2px;
  border-top:1px solid var(--line);
  position:relative;
}
.board-item:first-child{border-top:none;}
.board-avatar{
  flex-shrink:0;
  width:34px;
  height:34px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:var(--display);
  font-size:15px;
  font-style:italic;
  color:#fff;
  background:var(--latte);
}
.board-avatar.author-B{background:var(--clay);}
.board-item-body{flex:1;min-width:0;}
.board-item.is-pinned .board-item-body::before{
  content:"釘選";
  display:inline-block;
  font-size:10px;
  letter-spacing:0.1em;
  color:var(--latte);
  border:1px solid var(--latte-soft);
  border-radius:999px;
  padding:1px 8px;
  margin-bottom:8px;
}
.board-item.is-done .board-item-text{opacity:0.4;text-decoration:line-through;}
.board-item-top{
  display:flex;
  align-items:baseline;
  gap:8px;
  margin-bottom:6px;
}
.board-item-author{
  font-size:13px;
  font-weight:500;
  color:var(--ink);
}
.board-item-type{
  font-size:11px;
  color:var(--clay);
  letter-spacing:0.04em;
}
.board-item-time{
  font-size:11px;
  color:var(--ink-soft);
  margin-left:auto;
  flex-shrink:0;
}
.board-item-text{
  font-size:15px;
  line-height:1.7;
  margin:0 0 10px;
  white-space:pre-wrap;
  color:var(--ink);
}
.board-item-actions{
  display:flex;
  align-items:center;
  gap:18px;
}
.board-item-actions button{
  border:none;
  background:transparent;
  font-size:11px;
  letter-spacing:0.03em;
  color:var(--ink-soft);
  cursor:pointer;
  padding:0;
  opacity:0.7;
  transition:opacity 0.2s ease, color 0.2s ease;
}
.board-item-actions button:hover{opacity:1;}
.board-item-actions button.is-active{color:var(--latte);opacity:1;font-weight:500;}
.board-item-actions button.delete-btn:hover{color:#B0492F;opacity:1;}

/* ---------- 今天吃什麼：分類列表 ---------- */
.wheel-cat-add-card{margin-bottom:10px;}
.wheel-cat-add-row{display:flex;gap:10px;}
.wheel-cat-add-row input{flex:1;margin-bottom:0;}
.wheel-cat-add-row button{flex-shrink:0;}

.wheel-cat-list{
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(140px, 1fr));
  gap:14px;
}
.wheel-cat-card{
  position:relative;
  border:1px solid var(--line);
  border-radius:16px;
  padding:22px 18px;
  text-align:center;
  cursor:pointer;
  background:rgba(255,255,255,0.3);
  transition:transform 0.2s ease, background 0.2s ease;
}
.wheel-cat-card:hover{background:rgba(255,255,255,0.55);transform:translateY(-2px);}
.wheel-cat-card .cat-name{
  font-size:16px;
  font-weight:500;
  color:var(--ink);
  margin:0 0 6px;
}
.wheel-cat-card .cat-count{
  font-size:12px;
  color:var(--ink-soft);
}
.wheel-cat-card .cat-delete{
  position:absolute;
  top:8px;
  right:10px;
  border:none;
  background:transparent;
  color:var(--ink-soft);
  font-size:13px;
  opacity:0.5;
  cursor:pointer;
}
.wheel-cat-card .cat-delete:hover{opacity:1;color:#B0492F;}

/* ---------- 今天吃什麼：分類詳情 ---------- */
.wheel-back-btn{
  border:none;
  background:transparent;
  font-family:var(--serif);
  font-size:13px;
  color:var(--ink-soft);
  cursor:pointer;
  padding:0 0 4px;
  margin-bottom:6px;
}
.wheel-back-btn:hover{color:var(--latte);}

.wheel-stage{
  position:relative;
  display:flex;
  flex-direction:column;
  align-items:center;
  min-height:230px;
  justify-content:center;
  margin:10px 0 22px;
}
.wheel-cup-zone{
  cursor:pointer;
  transition:opacity 0.3s ease, transform 0.3s ease;
}
.wheel-cup-zone.shaking #wheel-cup{
  animation:wheel-shake 1.1s cubic-bezier(.36,.07,.19,.97) 1;
}
@keyframes wheel-shake{
  0%{transform:rotate(0deg);}
  8%{transform:rotate(-3deg);}
  16%{transform:rotate(3deg);}
  24%{transform:rotate(-6deg);}
  32%{transform:rotate(6deg);}
  40%{transform:rotate(-10deg);}
  48%{transform:rotate(9deg);}
  56%{transform:rotate(-11deg);}
  64%{transform:rotate(10deg);}
  72%{transform:rotate(-7deg);}
  80%{transform:rotate(6deg);}
  88%{transform:rotate(-3deg);}
  100%{transform:rotate(0deg);}
}
.wheel-cup-zone.shaking .stick{
  animation:wheel-stick-jitter 0.5s ease-in-out infinite;
  transform-box:fill-box;
  transform-origin:bottom center;
}
.wheel-cup-zone.shaking .stick-1{animation-delay:0.02s;}
.wheel-cup-zone.shaking .stick-2{animation-delay:0.09s;}
.wheel-cup-zone.shaking .stick-3{animation-delay:0.16s;}
.wheel-cup-zone.shaking .stick-4{animation-delay:0.05s;}
.wheel-cup-zone.shaking .stick-5{animation-delay:0.12s;}
.wheel-cup-zone.shaking .stick-6{animation-delay:0.07s;}
@keyframes wheel-stick-jitter{
  0%,100%{transform:rotate(0deg) translateY(0);}
  25%{transform:rotate(-3.5deg) translateY(-1px);}
  50%{transform:rotate(2.5deg) translateY(0.5px);}
  75%{transform:rotate(-2deg) translateY(-0.5px);}
}
.wheel-cup-zone.fading-out{
  opacity:0;
  transform:translateY(6px) scale(0.97);
}
.wheel-cup-zone.hidden{display:none;}

.wheel-result{
  display:flex;
  flex-direction:column;
  align-items:center;
}
.wheel-stick{
  background:linear-gradient(180deg, var(--cream-deep), var(--cream));
  border:1.5px solid var(--latte);
  border-radius:10px;
  padding:26px 30px;
  min-width:200px;
  text-align:center;
  box-shadow:0 14px 30px -14px rgba(70,60,50,0.35);
  animation:wheel-stick-rise 0.6s cubic-bezier(.2,.85,.25,1.15);
}
@keyframes wheel-stick-rise{
  0%{transform:translateY(70px) rotate(8deg) scale(0.8);opacity:0;}
  60%{transform:translateY(-6px) rotate(-2deg) scale(1.03);opacity:1;}
  100%{transform:translateY(0) rotate(0deg) scale(1);opacity:1;}
}
.wheel-stick-name{
  font-family:var(--display);
  font-size:24px;
  font-style:italic;
  color:var(--ink);
  margin:0;
}

#wheel-draw-btn{
  display:block;
  margin:0 auto;
  padding:10px 28px;
  border:none;
  background:var(--ink);
  color:var(--cream);
  border-radius:999px;
  font-family:var(--serif);
  letter-spacing:0.1em;
  cursor:pointer;
  transition:background 0.25s ease;
}
#wheel-draw-btn:hover{background:var(--latte);}

/* ---------- 今天吃什麼：選項清單 ---------- */
.wheel-list{display:flex;flex-direction:column;}
.wheel-item{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:12px 2px;
  border-top:1px solid var(--line);
  font-size:14px;
}
.wheel-item:first-child{border-top:none;}
.wheel-item button{
  border:none;
  background:transparent;
  font-size:12px;
  color:var(--ink-soft);
  opacity:0.6;
  cursor:pointer;
}
.wheel-item button:hover{opacity:1;color:#B0492F;}

/* ---------- 句子完整內容彈窗 ---------- */
.sentence-item{cursor:pointer;}
.modal-overlay{
  position:fixed;
  inset:0;
  background:rgba(50,42,34,0.34);
  opacity:0;
  pointer-events:none;
  transition:opacity 0.25s ease;
  z-index:70;
}
.modal-overlay.open{opacity:1;pointer-events:auto;}
.modal{
  position:fixed;
  top:50%;
  left:50%;
  width:min(440px, 86vw);
  max-height:78vh;
  overflow-y:auto;
  background:rgba(255,255,255,0.55);
  border:1px solid rgba(255,255,255,0.5);
  border-radius:24px;
  box-shadow:0 30px 70px -24px rgba(70,60,50,0.45);
  backdrop-filter:blur(18px) saturate(140%);
  -webkit-backdrop-filter:blur(18px) saturate(140%);
  padding:48px 36px 38px;
  transform:translate(-50%, -48%) scale(0.96);
  opacity:0;
  pointer-events:none;
  transition:opacity 0.25s ease, transform 0.25s ease;
  z-index:80;
}
html.theme-dark .modal{
  background:rgba(30,28,25,0.55);
  border-color:rgba(255,255,255,0.10);
}
.modal.open{
  opacity:1;
  transform:translate(-50%, -50%) scale(1);
  pointer-events:auto;
}
.modal-text{
  font-family:var(--display);
  font-size:21px;
  font-style:italic;
  line-height:1.7;
  color:var(--ink);
  margin:0 0 16px;
}
.modal-meta{
  font-size:12px;
  color:var(--ink-soft);
  display:flex;
  gap:10px;
  margin:0;
}
.modal-close,
.modal-copy{
  position:absolute;
  top:16px;
  border:none;
  background:transparent;
  color:var(--ink-soft);
  cursor:pointer;
  width:32px;
  height:32px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:50%;
  transition:background 0.2s ease, color 0.2s ease;
}
.modal-close{right:14px;font-size:14px;}
.modal-copy{right:52px;}
.modal-close:hover,
.modal-copy:hover{background:var(--latte-soft);color:#fff;}
.modal-copy.copied{color:#fff;background:var(--latte);}

@media (max-width:600px){
  .topbar{padding:28px 20px 16px;}
  .layout{padding:28px 20px 60px;}
  .card{padding:26px 22px;}
}
</style>
</head>

    <div id="board-banner" class="board-banner hidden">
      <span id="board-banner-text"></span>
      <button id="board-banner-btn" type="button">前往查看 →</button>
    </div>

    <!-- 每日一句 -->
    <section class="card daily-card">
      <p class="eyebrow">今日的句子 · <span id="today-date"></span></p>
      <blockquote id="daily-sentence" class="daily-text">尚無句子，從新增一句開始吧。</blockquote>
      <p id="daily-source" class="daily-source"></p>
      <div class="hr"></div>
    </section>

    <!-- 積分板 -->
    <section class="card score-card">
      <p class="eyebrow">積分</p>
      <div class="score-row">
        <div class="score-item">
          <p class="score-name" id="score-name-A">__NAME_A__</p>
          <p class="score-num" id="score-num-A">0</p>
        </div>
        <div class="score-divider">·</div>
        <div class="score-item">
          <p class="score-name" id="score-name-B">__NAME_B__</p>
          <p class="score-num" id="score-num-B">0</p>
        </div>
      </div>
    </section>

    <!-- 新增句子 -->
    <section class="card add-card">
      <p class="eyebrow">新增一句</p>
      <textarea id="new-text" placeholder="寫下那句讓你心動、安靜下來，或想留住的話……" rows="3"></textarea>
      <input type="text" id="new-source" placeholder="出處（作者／書名／電影，選填）">
      <button id="add-btn">收進句子盒</button>
      <p id="add-msg" class="add-msg"></p>
    </section>

    <!-- 搜尋 + 列表 -->
    <section class="card list-card">
      <div class="list-head">
        <p class="eyebrow">句子盒</p>
        <div class="view-toggle" id="view-toggle">
          <button type="button" class="view-btn" data-mode="cozy">文青</button>
          <button type="button" class="view-btn" data-mode="compact">緊湊</button>
        </div>
      </div>
      <input type="text" id="search-input" placeholder="搜尋句子、出處或新增者……">
      <div id="sentence-list" class="sentence-list">
        <p class="empty-hint">載入中……</p>
      </div>
    </section>

  </div>

  <!-- ============ 留言大聲公 ============ -->
  <div id="page-board" class="hidden">

    <section class="card board-compose-card">
      <p class="eyebrow">留言大聲公</p>
      <textarea id="board-text" placeholder="想說的話、想討論的事、提醒對方的事……" rows="4"></textarea>
      <div class="board-type-row" id="board-type-toggle">
        <button type="button" class="board-type-btn active" data-type="note">一般留言</button>
        <button type="button" class="board-type-btn" data-type="reminder">提醒事項</button>
      </div>
      <button id="board-send-btn">送出</button>
      <p id="board-msg" class="add-msg"></p>
    </section>

    <section class="card board-list-card">
      <p class="eyebrow">所有留言</p>
      <div id="board-list" class="board-list">
        <p class="empty-hint">載入中……</p>
      </div>
    </section>

  </div>

  <!-- ============ 今天吃什麼 ============ -->
  <div id="page-wheel" class="hidden">

    <!-- 第一層：分類列表 -->
    <div id="wheel-cat-view">
      <section class="card wheel-cat-add-card">
        <p class="eyebrow">今天吃什麼</p>
        <div class="wheel-cat-add-row">
          <input type="text" id="wheel-newcat-text" placeholder="新增分類，例如：晚餐、飲料、餐廳……">
          <button id="wheel-newcat-btn">新增分類</button>
        </div>
        <p id="wheel-newcat-msg" class="add-msg"></p>
      </section>

      <section class="card wheel-cat-list-card">
        <div id="wheel-cat-list" class="wheel-cat-list">
          <p class="empty-hint">載入中……</p>
        </div>
      </section>
    </div>

function openSentenceModal(id) {
  const s = allSentences.find(x => x.id === id);
  if (!s) return;
  document.getElementById("modal-text").textContent = `「${s.text}」`;
  const metaParts = [];
  if (s.source) metaParts.push(s.source);
  if (s.addedByName) metaParts.push(s.addedByName);
  document.getElementById("modal-meta").textContent = metaParts.join(" · ");
  document.getElementById("modal-copy").dataset.text = s.text;
  document.getElementById("sentence-modal").classList.add("open");
  document.getElementById("sentence-modal-overlay").classList.add("open");
}
function closeSentenceModal() {
  document.getElementById("sentence-modal").classList.remove("open");
  document.getElementById("sentence-modal-overlay").classList.remove("open");
}
function initSentenceModal() {
  document.getElementById("sentence-list").addEventListener("click", e => {
    const item = e.target.closest(".sentence-item");
    if (item) openSentenceModal(item.dataset.id);
  });
  document.getElementById("sentence-list").addEventListener("keydown", e => {
    if (e.key === "Enter") {
      const item = e.target.closest(".sentence-item");
      if (item) openSentenceModal(item.dataset.id);
    }
  });
  document.getElementById("modal-close").addEventListener("click", closeSentenceModal);
  document.getElementById("sentence-modal-overlay").addEventListener("click", closeSentenceModal);
  document.addEventListener("keydown", e => { if (e.key === "Escape") closeSentenceModal(); });

  document.getElementById("modal-copy").addEventListener("click", async (e) => {
    const btn = e.currentTarget;
    const text = btn.dataset.text || "";
    try {
      await navigator.clipboard.writeText(text);
    } catch {
      const ta = document.createElement("textarea");
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      ta.remove();
    }
    btn.classList.add("copied");
    setTimeout(() => btn.classList.remove("copied"), 1200);
  });
}

// ---------------- 啟動：訂閱 Firestore ----------------
function boot() {
  if (booted) return;
  booted = true;
  initWhoami();
  initViewToggle();
  initNavDrawer();
  initSentenceModal();
  initThemeToggle();

  const q = query(sentencesCol, orderBy("createdAt", "desc"));
  onSnapshot(q, snapshot => {
    allSentences = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
    renderScores();
    renderDaily();
    renderList(document.getElementById("search-input").value);
  });

  document.getElementById("search-input").addEventListener("input", e => {
    renderList(e.target.value);
  });

  document.getElementById("add-btn").addEventListener("click", addSentence);

  const boardQ = query(boardCol, orderBy("createdAt", "desc"));
  onSnapshot(boardQ, snapshot => {
    allBoardMsgs = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
    renderBoard();
    updateBoardBadge();
  });
  document.getElementById("board-send-btn").addEventListener("click", sendBoardMessage);
  document.querySelectorAll(".board-type-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".board-type-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
    });
  });

  const foodCatQ = query(foodCatCol, orderBy("createdAt", "asc"));
  onSnapshot(foodCatQ, snapshot => {
    allFoodCategories = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
    renderWheelCatList();
    renderWheelDetailTitle();
  });
  const foodQ = query(foodCol, orderBy("createdAt", "asc"));
  onSnapshot(foodQ, snapshot => {
    allFoodItems = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
    renderWheelCatList();
    renderWheelList();
  });
  document.getElementById("wheel-newcat-btn").addEventListener("click", addFoodCategory);
  document.getElementById("wheel-add-btn").addEventListener("click", addFoodItem);
  document.getElementById("wheel-back-btn").addEventListener("click", showWheelCatView);
  document.getElementById("wheel-draw-btn").addEventListener("click", drawWheel);

}

  }

  msg.textContent = "收進去了……";
  try {

      addedByName: nameOf(currentWho()),
      createdAt: serverTimestamp()
    });

// ---------------- 每日一句（同一天兩人看到一樣的句子） ----------------
function renderDaily() {
  const dateStr = new Date().toLocaleDateString("zh-Hant-TW", {
    year: "numeric", month: "long", day: "numeric"
  });
  document.getElementById("today-date").textContent = dateStr;

  if (allSentences.length === 0) return;

  const todayKey = new Date().toISOString().slice(0, 10); // YYYY-MM-DD
  const seed = hashString(todayKey);
  const index = seed % allSentences.length;
  const pick = allSentences[index];

  document.getElementById("daily-sentence").textContent = pick.text;
  document.getElementById("daily-source").textContent =
    [pick.source, pick.addedByName].filter(Boolean).join(" · ");
}

function hashString(str) {
  let hash = 0;
  for (let i = 0; i < str.length; i++) {
    hash = (hash << 5) - hash + str.charCodeAt(i);
    hash |= 0;
  }
  return Math.abs(hash);
}

// ---------------- 搜尋列表 ----------------
function renderList(keyword) {
  const list = document.getElementById("sentence-list");
  const kw = (keyword || "").trim().toLowerCase();

  const filtered = allSentences.filter(s => {
    if (!kw) return true;
    return (
      (s.text || "").toLowerCase().includes(kw) ||
      (s.source || "").toLowerCase().includes(kw) ||
      (s.addedByName || "").toLowerCase().includes(kw)
    );
  });

  if (filtered.length === 0) {
    list.innerHTML = `<p class="empty-hint">${allSentences.length === 0 ? "句子盒還是空的，新增第一句吧。" : "沒有找到符合的句子。"}</p>`;
    return;
  }

  list.innerHTML = filtered.map(s => `
    <div class="sentence-item" data-id="${escapeHtml(s.id)}" role="button" tabindex="0">
      <p class="text" title="${escapeHtml(s.text)}">「${escapeHtml(s.text)}」</p>
      <p class="meta">
        ${s.source ? `<span>${escapeHtml(s.source)}</span>` : ""}
        <span class="tag">${escapeHtml(s.addedByName || "")}</span>
      </p>
    </div>
  `).join("");
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

// ---------------- 留言大聲公 ----------------
async function sendBoardMessage() {
  const textEl = document.getElementById("board-text");
  const msg = document.getElementById("board-msg");
  const text = textEl.value.trim();
  if (!text) {
    msg.textContent = "先寫點什麼吧。";
    return;
  }
  const type = document.querySelector(".board-type-btn.active").dataset.type;
  const who = currentWho();
  const other = who === "A" ? "B" : "A";

  const data = {
    text,
    type,
    author: who,
    authorName: nameOf(who),
    pinned: false,
    done: false,
    createdAt: serverTimestamp(),
    [`read${who}`]: true,
    [`read${other}`]: false
  };

  try {
    await addDoc(boardCol, data);
    textEl.value = "";
    document.querySelectorAll(".board-type-btn").forEach(b => b.classList.remove("active"));
    document.querySelector('.board-type-btn[data-type="note"]').classList.add("active");
    msg.textContent = "已送出 ✓";
    setTimeout(() => { msg.textContent = ""; }, 1800);
  } catch (err) {
    msg.textContent = "送出失敗，檢查一下網路？";
    console.error(err);
  }
}

function renderBoard() {
  const list = document.getElementById("board-list");
  if (allBoardMsgs.length === 0) {
    list.innerHTML = `<p class="empty-hint">還沒有留言，寫下第一則吧。</p>`;
    return;
  }

  const sorted = [...allBoardMsgs].sort((a, b) => {
    if (!!a.pinned !== !!b.pinned) return a.pinned ? -1 : 1;
    return 0; // 其餘維持 createdAt desc（query 已排序）
  });

  list.innerHTML = sorted.map(m => {
    const initial = (m.authorName || "?").charAt(0);
    return `
    <div class="board-item ${m.pinned ? "is-pinned" : ""} ${m.done ? "is-done" : ""}" data-id="${escapeHtml(m.id)}">
      <div class="board-avatar author-${m.author}">${escapeHtml(initial)}</div>
      <div class="board-item-body">
        <div class="board-item-top">
          <span class="board-item-author">${escapeHtml(m.authorName || "")}</span>
          ${m.type === "reminder" ? `<span class="board-item-type">提醒事項</span>` : ""}
          <span class="board-item-time">${formatRelativeTime(m.createdAt)}</span>
        </div>
        <p class="board-item-text">${escapeHtml(m.text)}</p>
        <div class="board-item-actions">
          <button type="button" class="pin-btn ${m.pinned ? "is-active" : ""}" data-id="${escapeHtml(m.id)}">${m.pinned ? "已釘選" : "釘選"}</button>
          ${m.type === "reminder" ? `<button type="button" class="done-btn ${m.done ? "is-active" : ""}" data-id="${escapeHtml(m.id)}">${m.done ? "已處理" : "標記已處理"}</button>` : ""}
          ${m.author === currentWho() ? `<button type="button" class="delete-btn" data-id="${escapeHtml(m.id)}">刪除</button>` : ""}
        </div>
      </div>
    </div>
  `;
  }).join("");

  list.querySelectorAll(".pin-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const m = allBoardMsgs.find(x => x.id === btn.dataset.id);
      updateDoc(doc(db, "board", btn.dataset.id), { pinned: !m.pinned });
    });
  });
  list.querySelectorAll(".done-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const m = allBoardMsgs.find(x => x.id === btn.dataset.id);
      updateDoc(doc(db, "board", btn.dataset.id), { done: !m.done });
    });
  });
  list.querySelectorAll(".delete-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      if (confirm("確定要刪除這則留言嗎？")) {
        deleteDoc(doc(db, "board", btn.dataset.id));
      }
    });
  });
}

function updateBoardBadge() {
  const who = currentWho();
  const unreadCount = allBoardMsgs.filter(m => m.author !== who && !m[`read${who}`]).length;

  const badge = document.getElementById("board-badge");
  const dot = document.getElementById("menu-dot");
  const banner = document.getElementById("board-banner");
  const bannerText = document.getElementById("board-banner-text");

  if (unreadCount > 0) {
    badge.textContent = unreadCount;
    badge.classList.remove("hidden");
    dot.classList.remove("hidden");
    banner.classList.remove("hidden");
    bannerText.textContent = `📣 有 ${unreadCount} 則新留言或提醒等你看`;
  } else {
    badge.classList.add("hidden");
    dot.classList.add("hidden");
    banner.classList.add("hidden");
  }
}

function markBoardRead() {
  const who = currentWho();
  allBoardMsgs
    .filter(m => m.author !== who && !m[`read${who}`])
    .forEach(m => updateDoc(doc(db, "board", m.id), { [`read${who}`]: true }));
}

function formatRelativeTime(ts) {
  if (!ts || !ts.toDate) return "";
  const date = ts.toDate();
  const diffMs = Date.now() - date.getTime();
  const min = Math.floor(diffMs / 60000);
  if (min < 1) return "剛剛";
  if (min < 60) return `${min} 分鐘前`;
  const hr = Math.floor(min / 60);
  if (hr < 24) return `${hr} 小時前`;
  const day = Math.floor(hr / 24);
  if (day < 7) return `${day} 天前`;
  return date.toLocaleDateString("zh-TW", { month: "numeric", day: "numeric" });
}

    setTimeout(() => { msg.textContent = ""; }, 1500);

  }

function renderWheelCatList() {
  const list = document.getElementById("wheel-cat-list");
  if (allFoodCategories.length === 0) {
    list.innerHTML = `<p class="empty-hint">還沒有分類，先新增一個吧（例如：晚餐、飲料）。</p>`;
    return;
  }
  list.innerHTML = allFoodCategories.map(cat => {
    const count = allFoodItems.filter(f => f.categoryId === cat.id).length;
    return `
    <div class="wheel-cat-card" data-id="${escapeHtml(cat.id)}">
      <button type="button" class="cat-delete" data-id="${escapeHtml(cat.id)}" title="刪除分類">✕</button>
      <p class="cat-name">${escapeHtml(cat.name)}</p>
      <p class="cat-count">${count} 個選項</p>
    </div>
  `;
  }).join("");

  list.querySelectorAll(".wheel-cat-card").forEach(card => {
    card.addEventListener("click", e => {
      if (e.target.closest(".cat-delete")) return;
      openWheelCategory(card.dataset.id);
    });
  });
  list.querySelectorAll(".cat-delete").forEach(btn => {
    btn.addEventListener("click", () => {
      const cat = allFoodCategories.find(c => c.id === btn.dataset.id);
      const count = allFoodItems.filter(f => f.categoryId === btn.dataset.id).length;
      const warn = count > 0 ? `這個分類裡還有 ${count} 個選項，刪除分類不會自動刪除它們。確定要刪除「${cat.name}」嗎？` : `確定要刪除「${cat.name}」嗎？`;
      if (confirm(warn)) {
        deleteDoc(doc(db, "foodCategories", btn.dataset.id));
      }
    });
  });
}

    setTimeout(() => { msg.textContent = ""; }, 1500);
  } catch (err) {

}

function resetWheelStage() {
  document.getElementById("wheel-cup-zone").classList.remove("hidden", "shaking", "fading-out");
  document.getElementById("wheel-result").classList.add("hidden");
  document.getElementById("wheel-msg").textContent = "";
}

function drawWheel() {
  if (!currentCategoryId) return;
  const cupZone = document.getElementById("wheel-cup-zone");
  const msg = document.getElementById("wheel-msg");
  if (cupZone.classList.contains("shaking")) return;

  const items = allFoodItems.filter(f => f.categoryId === currentCategoryId);
  if (items.length === 0) {
    msg.textContent = "這個分類還沒有任何選項，先新增一個吧。";
    return;
  }

  document.getElementById("wheel-result").classList.add("hidden");
  msg.textContent = "";
  cupZone.classList.remove("hidden", "fading-out");
  cupZone.classList.add("shaking");

  const picked = items[Math.floor(Math.random() * items.length)];

  // 搖晃結束：筒子淡出
  setTimeout(() => {
    cupZone.classList.remove("shaking");
    cupZone.classList.add("fading-out");
  }, 1100);

  // 筒子淡出後：籤條飛出定格
  setTimeout(() => {
    cupZone.classList.add("hidden");
    document.getElementById("wheel-result-name").textContent = picked.name;
    document.getElementById("wheel-result").classList.remove("hidden");
  }, 1380);
}
</script>
</body>
</html>
